      // Station name pronunciation dictionary
      const stationReadings = {

        { name: '和銅黒谷〜影森', stations: ['和銅黒谷','武州原谷(貨)','大野原','秩父','御花畑','影森'] },

      const LINE_ALL = [

        '上長瀞','長瀞','野上','樋口','波久礼',
        '寄居','桜沢','小前田','ふかや花園','永田','武川'
      ];

      const DISPLAY_STATIONS = new Set(LINE_ALL);

      const ROW_PAD = {
        0: { left: 0.06, right: 0.06 }, // 1段目: 両端均等
        1: { left: 0.06, right: 0.06 }, // 2段目: 両端均等
        2: { left: 0.06, right: 0.06 }, // 3段目: 両端均等
      };

      function stationPos01(lineIndex, stationIdx, numStations){
        const pad = ROW_PAD[lineIndex] || { left: 0.02, right: 0.02 };
        const usable = 1 - pad.left - pad.right;
        if(numStations <= 1) return pad.left + usable/2;
        return pad.left + (stationIdx/(numStations-1))*usable;
      }

      function lerp(a,b,t){ return a + (b-a)*t; }

      function shouldShowOnLine(pos, lineIndex){
        if(!pos) return false;
        if(pos.mode === 'station'){
          return LINES[lineIndex].stations.includes(pos.at);
        }
        const fromLine = LINES.findIndex(x => x.stations.includes(pos.from));
        const toLine   = LINES.findIndex(x => x.stations.includes(pos.to));
        if(fromLine === -1 || toLine === -1) return false;
        if(fromLine === toLine) return fromLine === lineIndex;
        // 段またぎの場合は、出発段でのみ表示（到着段には表示しない）
        if(Math.abs(fromLine - toLine) !== 1) return false;
        return lineIndex === fromLine;
      }

      function posToX01(pos, lineIndex){
        const stations = LINES[lineIndex].stations;
        const n = stations.length;

        if(pos.mode === 'station'){
          const idx = stations.indexOf(pos.at);
          if(idx === -1) return null;
          return stationPos01(lineIndex, idx, n);
        }

        const fromLine = LINES.findIndex(x => x.stations.includes(pos.from));
        const toLine   = LINES.findIndex(x => x.stations.includes(pos.to));
        if(fromLine === -1 || toLine === -1) return null;

        if(fromLine === toLine && fromLine === lineIndex){
          const a = stations.indexOf(pos.from);
          const b = stations.indexOf(pos.to);
          if(a === -1 || b === -1) return null;
          const xA = stationPos01(lineIndex, a, n);
          const xB = stationPos01(lineIndex, b, n);
          return lerp(xA, xB, pos.progress);
        }

        // 段またぎの場合：出発段でのみ表示、方向に応じて端まで移動
        if(Math.abs(fromLine - toLine) !== 1) return null;
        if(lineIndex === fromLine){
          const aIdx = LINES[fromLine].stations.indexOf(pos.from);
          if(aIdx === -1) return null;
          const xA = stationPos01(fromLine, aIdx, LINES[fromLine].stations.length);
          
          // 方向を判定（fromLineとtoLineの関係から）
          // 下り（影森→武川）: fromLine > toLine（3→2, 2→1）→ 左端(0.0)へ
          // 上り（武川→影森）: fromLine < toLine（1→2, 2→3）→ 右端(1.0)へ
          const isDownTrain = fromLine > toLine;
          const targetX = isDownTrain ? 0.0 : 1.0;
          
          return lerp(xA, targetX, pos.progress);
        }

        return null;
      }

      function clamp01(x){ return Math.max(0, Math.min(1, x)); }

      function hhmm_to_sec(hhmm){
        if(!hhmm || typeof hhmm !== 'string') return null;
        
        // Handle "515" format (HHMM without colon)
        if(/^\d{3,4}$/.test(hhmm.trim())) {
          const num = hhmm.trim();
          let h, mi;
          if(num.length === 3) {
            // "515" -> 5:15
            h = Number(num[0]);
            mi = Number(num.slice(1));
          } else {
            // "1515" -> 15:15
            h = Number(num.slice(0, 2));
            mi = Number(num.slice(2));
          }
          return h*3600 + mi*60;
        }
        
        // Handle "5:15" format (HH:MM with colon)
        const m = hhmm.trim().match(/^(\d{1,2}):(\d{2})$/);
        if(!m) return null;
        const h = Number(m[1]);
        const mi = Number(m[2]);
        return h*3600 + mi*60;
      }

      function format_hhmmss(d){
        const hh = String(d.getHours()).padStart(2,'0');
        const mm = String(d.getMinutes()).padStart(2,'0');
        const ss = String(d.getSeconds()).padStart(2,'0');
        return `${hh}:${mm}:${ss}`;
      }

      function sec_now(d){
        return d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
      }

      function getArrDepSec(st){
        const arr = hhmm_to_sec(st?.arr || st?.time);
        const dep = hhmm_to_sec(st?.dep || st?.time);
        if(arr == null && dep == null) return { arrSec: null, depSec: null };
        return { arrSec: arr ?? dep, depSec: dep ?? arr };
      }

      function stationIndex(name) {
        return LINE_ALL.indexOf(name);
      }

      function deduplicateSchedule(schedule) {
        const result = [];
        const stationMap = new Map();
        
        for (const stop of schedule) {
          // Skip pass-only stops (no arrival or departure time)
          if (stop.pass && !stop.arr && !stop.dep && !stop.time) {
            continue;
          }
          
          // Helper to check if time is valid (3-4 digits or HH:MM format)
          const isValidTime = (t) => {
            if (!t) return false;
            if (typeof t !== 'string') return false;
            return /^\d{3,4}$/.test(t.trim()) || /^\d{1,2}:\d{2}$/.test(t.trim());
          };
          
          // Skip if all time values are invalid
          if (!isValidTime(stop.arr) && !isValidTime(stop.dep) && !isValidTime(stop.time)) {
            continue;
          }
          
          const station = stop.station;
          if (stationMap.has(station)) {
            const existing = stationMap.get(station);
            // Only update with valid times
            if (isValidTime(stop.arr)) existing.arr = stop.arr;
            if (isValidTime(stop.dep)) existing.dep = stop.dep;
            if (isValidTime(stop.time)) {
              if (!existing.arr) existing.arr = stop.time;
              if (!existing.dep) existing.dep = stop.time;
            }
          } else {
            stationMap.set(station, { ...stop });
            result.push(stationMap.get(station));
          }
        }
        
        return result;
      }

      function normalizeSchedule(train) {
        const sch = Array.isArray(train?.schedule) ? train.schedule : [];
        const deduplicated = deduplicateSchedule(sch);
        const validStops = deduplicated.filter(s => DISPLAY_STATIONS.has(s.station));
        if (validStops.length < 2) return { schedule: [], direction: null };

        const firstIdx = stationIndex(validStops[0].station);
        const lastIdx = stationIndex(validStops[validStops.length - 1].station);
        const direction = lastIdx < firstIdx ? 'up' : 'down';

        return { schedule: validStops, direction };
      }

      function calcPosition(train, nowDate){
        const sch = train.normalizedSchedule || [];
        
        if(sch.length < 2) return null;

        const now = sec_now(nowDate);

        const lead = 5*60;
        const first = getArrDepSec(sch[0]).depSec;
        const last = getArrDepSec(sch[sch.length-1]).arrSec;
        if(first == null || last == null) return null;
        if(now < first - lead) return null;
        if(now > last + lead) return null;

        // Helper function to get station distance for estimation
        function getStationDistance(stationA, stationB) {
          for (const line of LINES) {
            const idxA = line.stations.indexOf(stationA);
            const idxB = line.stations.indexOf(stationB);
            if (idxA !== -1 && idxB !== -1) {
              return Math.abs(idxB - idxA);
            }
          }
          return 1; // Default if not found
        }

        for(let i=0;i<sch.length;i++){
          const {arrSec, depSec} = getArrDepSec(sch[i]);
          if(arrSec == null || depSec == null) continue;
          const pass = !!sch[i].pass;
          if(pass) continue;
          if(now >= arrSec && now <= depSec){
            return { mode:'station', at: sch[i].station, passStations: [] };
          }
        }

        for(let i=0;i<sch.length-1;i++){
          const A = sch[i];
          const B = sch[i+1];
          let a = getArrDepSec(A).depSec;
          let b = getArrDepSec(B).arrSec;
          
          // If times are missing, estimate them based on adjacent segments
          if(a == null || b == null) {
            // Find previous segment with time
            let prevA = null, prevB = null, prevDist = 0;
            for(let j = i - 1; j >= 0; j--) {
              const pA = getArrDepSec(sch[j]).depSec;
              const pB = getArrDepSec(sch[j + 1]).arrSec;
              if(pA != null && pB != null) {
                prevA = pA;
                prevB = pB;
                prevDist = getStationDistance(sch[j].station, sch[j + 1].station);
                break;
              }
            }
            
            // Find next segment with time
            let nextA = null, nextB = null, nextDist = 0;
            for(let j = i + 1; j < sch.length - 1; j++) {
              const nA = getArrDepSec(sch[j]).depSec;
              const nB = getArrDepSec(sch[j + 1]).arrSec;
              if(nA != null && nB != null) {
                nextA = nA;
                nextB = nB;
                nextDist = getStationDistance(sch[j].station, sch[j + 1].station);
                break;
              }
            }
            
            // Estimate speed from available data
            let estimatedSpeed = null;
            if(prevA != null && prevB != null && prevDist > 0) {
              estimatedSpeed = prevDist / (prevB - prevA);
            } else if(nextA != null && nextB != null && nextDist > 0) {
              estimatedSpeed = nextDist / (nextB - nextA);
            }
            
            if(estimatedSpeed != null && estimatedSpeed > 0) {
              const currentDist = getStationDistance(A.station, B.station);
              const estimatedTime = currentDist / estimatedSpeed;
              
              // If departure time is missing but we have previous arrival
              if(a == null) {
                const arrA = getArrDepSec(A).arrSec;
                if(arrA != null) {
                  a = arrA; // Assume immediate departure
                }
              }
              
              // If we still don't have 'a', try to work backwards from 'b'
              if(a == null && b != null) {
                a = b - estimatedTime;
              }
              
              // If we have 'a' but not 'b', calculate forward
              if(a != null && b == null) {
                b = a + estimatedTime;
              }
            }
          }
          
          if(a == null || b == null) continue;
          if(b <= a) continue;
          if(now >= a && now <= b){
            const progress = clamp01((now - a) / (b - a));

            const lineA = LINES.findIndex(x => x.stations.includes(A.station));
            const lineB = LINES.findIndex(x => x.stations.includes(B.station));
            let passStations = [];
            if(lineA !== -1 && lineA === lineB){
              const s = LINES[lineA].stations;
              const ia = s.indexOf(A.station);
              const ib = s.indexOf(B.station);
              if(ia !== -1 && ib !== -1 && Math.abs(ia-ib) >= 2){
                const lo = Math.min(ia,ib);
                const hi = Math.max(ia,ib);
                // 武州原谷は通過表示から除外（急行・SL・貨物は除く）
                const shouldShowPass = train.type === '急行' || train.type === 'SL' || train.type === '貨物';
                passStations = s.slice(lo+1, hi).filter(st => shouldShowPass || st !== '武州原谷');
              }
            }

            return { mode:'between', from:A.station, to:B.station, progress, passStations };
          }
        }

        return null;
      }

      function getDayKeys(dayType){
        return dayType === 'weekday'
          ? ['weekday_up','weekday_down']
          : ['holiday_up','holiday_down'];
      }

      function firstTrainTimeSec(schedules, dayType){
        const [k1,k2] = getDayKeys(dayType);
        const arr = [];
        for(const t of [...(schedules[k1]||[]), ...(schedules[k2]||[])]){
          const { schedule } = normalizeSchedule(t);
          if(!schedule.length) continue;
          const sec = getArrDepSec(schedule[0]).depSec;
          if(sec != null) arr.push(sec);
        }
        if(!arr.length) return 5*3600;
        return Math.min(...arr);
      }

      function setTimeToSec(baseDate, sec){
        const d = new Date(baseDate);
        const h = Math.floor(sec/3600);
        const m = Math.floor((sec%3600)/60);
        const s = sec%60;
        d.setHours(h,m,s,0);
        return d;
      }

      function formatTimeDisplay(hhmm) {
        if (!hhmm || hhmm === '―') return '―';
        if (typeof hhmm !== 'string') return '―';
        
        // Handle HHMM format like '515' or '1515' (must be 3 or 4 digits)
        const trimmed = hhmm.trim();
        if (/^\d{3,4}$/.test(trimmed)) {
          const num = trimmed;
          let h, mi;
          if (num.length === 3) {
            h = num[0];
            mi = num.slice(1);
          } else {
            h = num.slice(0, 2);
            mi = num.slice(2);
          }
          return h + ':' + mi;
        }
        
        // Already formatted with colon
        if (/^\d{1,2}:\d{2}$/.test(trimmed)) {
          return trimmed;
        }
        
        // Invalid format - return as dash
        return '―';
      }

      function getFinalDestination(train) {
        const schedule = train.schedule;
        if (!schedule || schedule.length === 0) return '';
        // 末尾から走査し、arrのみ終着（三峰口等）を正しく拾う
        let lastDepIdx = -1;
        let lastArrIdx = -1;
        for (let i = schedule.length - 1; i >= 0; i--) {
          const stop = schedule[i];
          if ((stop.dep || stop.time) && lastDepIdx === -1) lastDepIdx = i;
          if (stop.arr && lastArrIdx === -1) lastArrIdx = i;
          if (lastDepIdx !== -1 && lastArrIdx !== -1) break;
        }
        if (lastArrIdx > lastDepIdx) {
          return schedule[lastArrIdx].station || '';
        }
        if (lastDepIdx !== -1) {
          return schedule[lastDepIdx].station || '';
        }
        return schedule[schedule.length - 1].station || '';
      }

      function getTimeUntilDeparture(train, nowDate) {
        if (train.position.mode !== 'station') return null;
        
        const sch = train.normalizedSchedule || [];
        const stopData = sch.find(s => s.station === train.position.at);
        if (!stopData) return null;
        
        const {depSec} = getArrDepSec(stopData);
        if (depSec == null) return null;
        
        const now = sec_now(nowDate);
        const remaining = depSec - now;
        
        if (remaining <= 0) return null;
        
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        
        return { minutes, seconds, total: remaining };
      }

        // Get departure time from origin station
        const getDepartureTime = (train) => {
          const sch = train.schedule || [];
          if (sch.length === 0) return null;
          
          // Find first station with departure time
          for (const stop of sch) {
            if (stop.dep || stop.time) {
              const time = stop.dep || stop.time;
              const sec = hhmm_to_sec(time);
              return sec;
            }
          }
          return null;
        };
        
        // Get all freight and SL trains from schedules
        const getFreightTrains = (dayType) => {
          const upTrains = [];
          const downTrains = [];
          const schedules = window.SCHEDULES;
          const seenIds = new Set(); // Track seen IDs to avoid duplicates
          
          [`${dayType}_up`, `${dayType}_down`].forEach(key => {
            schedules[key].forEach(train => {
              if (train.type === '貨物' || train.type === 'SL') {
                // Skip if already added
                if (seenIds.has(train.id)) return;
                seenIds.add(train.id);
                
                const trainData = {
                  id: train.id,
                  name: train.type === 'SL' ? `SL ${train.id}` : (train.name || train.id),
                  type: train.type,
                  direction: train.direction,
                  departureTime: getDepartureTime(train)
                };
                
                // Classify by last digit: even = up, odd = down
                const lastDigit = parseInt(String(train.id).slice(-1));
                const isUp = lastDigit % 2 === 0;
                
                if (isUp) {
                  upTrains.push(trainData);
                } else {
                  downTrains.push(trainData);
                }
              }
            });

          // Sort by departure time

            if (a.departureTime === null) return 1;
            if (b.departureTime === null) return -1;
            return a.departureTime - b.departureTime;
          };
          
          upTrains.sort(sortByTime);
          downTrains.sort(sortByTime);
          
          return { upTrains, downTrains };

      function TimeJumpModal({ onClose, onJump, currentTime }) {
        const [timeInput, setTimeInput] = React.useState('');

        const handleJump = () => {
          // Parse time input (HHMM or HH:MM format)
          let hours, minutes;
          const input = timeInput.replace(':', '');
          
          if (input.length === 3) {
            // HMM format (e.g., 530 = 5:30)
            hours = parseInt(input.slice(0, 1));
            minutes = parseInt(input.slice(1, 3));
          } else if (input.length === 4) {
            // HHMM format (e.g., 1530 = 15:30)
            hours = parseInt(input.slice(0, 2));
            minutes = parseInt(input.slice(2, 4));
          } else {
            alert('時刻は HHMM 形式で入力してください（例: 1530）');
            return;
          }

          if (isNaN(hours) || isNaN(minutes) || hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
            alert('正しい時刻を入力してください');
            return;
          }

          const targetSec = hours * 3600 + minutes * 60;
          onJump(targetSec);
          onClose();
        };

        const currentHours = Math.floor(currentTime / 3600) % 24;
        const currentMinutes = Math.floor((currentTime % 3600) / 60);
        const currentDisplay = `${String(currentHours).padStart(2, '0')}:${String(currentMinutes).padStart(2, '0')}`;

        return h('div', { className: 'modal-overlay', onClick: onClose },
          h('div', { 
            className: 'modal-content', 
            onClick: (e) => e.stopPropagation(),
            style: { maxWidth: '350px' }
          },
            h('div', { className: 'p-4 border-b border-white/20' },
              h('div', { className: 'flex items-center justify-between' },
                h('div', { className: 'text-white text-xl font-bold monojp' }, '時刻ジャンプ'),
                h('button', { onClick: onClose, className: 'btn monojp' }, '✕')
              )
            ),
            h('div', { className: 'p-4' },
              h('div', { className: 'text-white/70 text-sm monojp mb-3' }, 
                `現在時刻: ${currentDisplay}`
              ),
              h('div', { className: 'mb-4' },
                h('label', { className: 'text-white/90 text-sm monojp block mb-1' }, 'ジャンプ先時刻'),
                h('input', {
                  type: 'text',
                  className: 'w-full px-3 py-2 rounded monojp text-lg',
                  style: { color: '#000', backgroundColor: '#d1d5db' },
                  placeholder: '1530 (15:30)',
                  value: timeInput,
                  onChange: (e) => setTimeInput(e.target.value),
                  onKeyPress: (e) => {
                    if (e.key === 'Enter') handleJump();
                  },
                  autoFocus: true
                })
              ),
              h('div', { className: 'text-white/60 text-xs monojp' }, 
                'HHMM形式で入力（例: 0530、1530）'
              )
            ),
            h('div', { className: 'p-4 border-t border-white/20 flex gap-2 justify-end' },
              h('button', { className: 'btn monojp', onClick: onClose }, 'キャンセル'),
              h('button', { className: 'btn monojp', onClick: handleJump }, 'ジャンプ')
            )
          )
        );
      }

        });
        const [now, setNow] = useState(() => new Date());
        const [timeMode, setTimeMode] = useState('now'); // 'now' or 'first'
        const [windowWidth, setWindowWidth] = useState(window.innerWidth);
        useEffect(() => {
          const onResize = () => setWindowWidth(window.innerWidth);
          window.addEventListener('resize', onResize);
          return () => window.removeEventListener('resize', onResize);
        }, []);

        const trainData = useMemo(() => {
          const keyUp = dayType === 'weekday' ? 'weekday_up' : 'holiday_up';
          const keyDown = dayType === 'weekday' ? 'weekday_down' : 'holiday_down';
          const up = Array.isArray(schedules?.[keyUp]) ? schedules[keyUp] : [];
          const down = Array.isArray(schedules?.[keyDown]) ? schedules[keyDown] : [];

          const processTrains = (trains) => {
            return trains.map(t => {
              // SL trains only run on holidays - skip on weekdays
              if (t.type === 'SL' && dayType === 'weekday') {
                return null;
              }
              
              // Modify schedule for section-suspended trains
              let modifiedSchedule = t.schedule;
              if (t.type === '貨物' && savedSectionSuspended.has(t.id)) {
                // For section-suspended freight trains: 武州原谷(貨)-影森 section is suspended
                // 武州原谷(貨) becomes turnaround station, operates only to/from 武川 direction
                // Upbound: operates 武川～武州原谷(貨), suspended 武州原谷(貨)～影森
                // Downbound: operates 武州原谷(貨)～武川, suspended 影森～武州原谷(貨)
                // Remove stations: 影森, 御花畑, 秩父, 大野原
                const stationsToRemove = ['影森', '御花畑', '秩父', '大野原'];
                modifiedSchedule = t.schedule.filter(stop => {
                  return !stationsToRemove.includes(stop.station);
                });
              }
              
              const { schedule: normalizedSchedule, direction } = normalizeSchedule({ ...t, schedule: modifiedSchedule });
              const isSectionSuspended = t.type === '貨物' && savedSectionSuspended.has(t.id);
              if (!direction || normalizedSchedule.length < 2) return null;
              return { 
                ...t, 
                normalizedSchedule, 
                direction,
                sectionSuspended: isSectionSuspended
              };

          };

          // Add custom trains for current day type
          console.log('customTrains:', customTrains);
          const customTrainsForDay = customTrains.filter(ct => {

          console.log('customTrainsForDay:', customTrainsForDay);

          const allTrains = [...processTrains(up), ...processTrains(down), ...processTrains(customTrainsForDay)];

        }, [dayType, schedules, savedSectionSuspended, customTrains]);

        useEffect(() => {

        // Fetch delay information from GAS (JSONP方式でCORSを回避)
        useEffect(() => {
          const updateTrainInfo = () => {
            const gasUrl = "https://script.google.com/macros/s/AKfycbzaaDgjKPO32RSWCn9LCUXGH2X3p1_UUu_dAyB24MdtOn0h6v62z8lISRYyk1VDbo9nww/exec";
            const callbackName = "gasCallback_" + Date.now();

            // タイムアウト処理
            const timeoutId = setTimeout(() => {
              console.error("運行情報の取得がタイムアウトしました");
              if (window[callbackName]) delete window[callbackName];
              const script = document.getElementById("gas-jsonp-script");
              if (script) script.remove();
            }, 10000);

            // コールバック関数を定義
            window[callbackName] = (data) => {
              clearTimeout(timeoutId);
              delete window[callbackName];
              const script = document.getElementById("gas-jsonp-script");
              if (script) script.remove();

              console.log("運行情報を更新しました:", data.lastUpdate);

              // GASのparseOperationInfoが返すsummary/statusを使用
              if (data.status === "delay") {
                setDelayInfo([{ title: data.summary, description: data.detail || '', pubDate: data.lastUpdate }]);
                setLatestNormalTime('');
              } else {
                setDelayInfo([]);
                // lastUpdateから時刻を抽出（例：「2025年6月1日7:00現在」→「7:00」）
                const timeMatch = (data.lastUpdate || '').match(/(\d{1,2}:\d{2})/);
                if (timeMatch) {
                  setLatestNormalTime(timeMatch[1]);
                } else {
                  setLatestNormalTime('');
                }
              }
            };

            // scriptタグを使ってJSONPリクエストを送信
            const oldScript = document.getElementById("gas-jsonp-script");
            if (oldScript) oldScript.remove();
            const script = document.createElement("script");
            script.id = "gas-jsonp-script";
            script.src = gasUrl + "?callback=" + callbackName;
            script.onerror = () => {
              clearTimeout(timeoutId);
              console.error("運行情報の取得に失敗しました");
              delete window[callbackName];
            };
            document.body.appendChild(script);
          };

          // ページ読み込み時に実行
          updateTrainInfo();
          // 5分おきに実行
          const interval = setInterval(updateTrainInfo, 300000);
          return () => clearInterval(interval);

        const trains = useMemo(() => {

        // Notification system - check if train has departed from specified station
        useEffect(() => {
          if (notificationSettings.length === 0) return;

          const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

          notificationSettings.forEach(setting => {
            if (!setting.enabled) return;

            // Find the train
            const train = trains.find(t => String(t.id) === String(setting.trainId));
            if (!train) return;

            // Check if train has departed from the specified station
            const schedule = train.normalizedSchedule || train.schedule || [];
            const stationStop = schedule.find(s => s.station === setting.station);
            if (!stationStop) return;

            // Get departure time
            let depTime = null;
            if (stationStop.dep && stationStop.dep !== '―') {
              depTime = hhmm_to_sec(stationStop.dep);

              depTime = hhmm_to_sec(stationStop.time);

            if (depTime === null) return;

            const notificationKey = `${setting.trainId}-${setting.station}`;

            // Trigger notification when train departs (within 2 second window)
            if (currentSec >= depTime && currentSec < depTime + 2 && !notifiedTrains.has(notificationKey)) {
              const trainType = train.type === '貨物' ? '貨物列車' : train.type === 'SL' ? 'SL列車' : train.type === '急行' ? '急行' : '列車';
              const stationReading = stationReadings[setting.station] || setting.station;
              const message = `${trainType}${setting.trainId}が${stationReading}を発車しました`;
              
              speakNotification(message);
              setNotifiedTrains(prev => new Set([...prev, notificationKey]));
              
              console.log('通知:', message);

        }, [trains, now, notificationSettings, notifiedTrains]);

        const adjust = (sec) => {

        const setToNowClock = () => { setNow(new Date()); setTimeMode('now'); };

        const goFirst = () => {

        const goExample = (targetDay, hh, mm) => {

        const tickMs = Math.max(16, Math.round(1000 / Math.max(1, speed)));
        
        const renderLine = (lineData, lineIndex) => {
          const stations = lineData.stations;
          const lineTrains = trains.filter(t => shouldShowOnLine(t.position, lineIndex));

          return h('div', { key: lineIndex, className: 'mb-6' },

                  return h('div', { key: st, className: 'absolute -translate-x-1/2', style: {left:`${pct}%`} },

                })
              ),
              h('div', { className: 'absolute inset-y-0 left-8 right-8' },
                ...(() => {
                  // Calculate Y positions with overlap detection
                  const trainsWithPos = lineTrains.map(t => {
                    let pct01 = posToX01(t.position, lineIndex);
                    if(pct01 == null) return null;
                    const pct = pct01*100;
                    
                    // Calculate stop duration if at station
                    let stopDuration = 0;
                    if(t.position.mode === 'station') {
                      const sch = t.normalizedSchedule || [];
                      const stopData = sch.find(s => s.station === t.position.at);
                      if(stopData) {
                        const {arrSec, depSec} = getArrDepSec(stopData);
                        if(arrSec != null && depSec != null) {
                          stopDuration = depSec - arrSec;
                        }
                      }
                    }
                    
                    return { train: t, pct, stopDuration };
                  }).filter(Boolean);
                  
                  // Detect overlaps and assign Y offsets
                  const yOffsets = new Map();
                  
                  // First pass: identify trains that need shifting
                  trainsWithPos.forEach((item, i) => {
                    // 線のtop位置（CSSの.top-[74px]と大画面対応）
                    const lineTop = windowWidth >= 1800 ? 136 : windowWidth >= 1400 ? 105 : 74;
                    // チップ実高さ約20px、線からのギャップ9px
                    const chipH = 20, gap = 9;
                    // top: calc(86.5px + y) が基準なので y = lineTop - 86.5 ± (gap + chipH)
                    // 上り: チップ上端のtop = lineTop - gap - chipH → y = (lineTop - gap - chipH) - 86.5
                    // 下り: チップ上端のtop = lineTop + gap          → y = (lineTop + gap) - 86.5
                    const baseY = item.train.direction === 'up'
                      ? (lineTop - gap - chipH) - 86.5
                      : (lineTop + gap) - 86.5;
                    let finalY = baseY;
                    let shouldShift = false;
                    
                    // Check for visual overlap with any other train
                    for(let j = 0; j < trainsWithPos.length; j++) {
                      if(j === i) continue;
                      const other = trainsWithPos[j];
                      
                      // Check if same direction
                      if(item.train.direction !== other.train.direction) continue;
                      
                      // Check horizontal distance (within 12% = potential overlap)
                      const xDiff = Math.abs(item.pct - other.pct);
                      if(xDiff > 12) continue;
                      
                      // Trains are close - determine which should shift
                      // Priority: shift the one with longer stop duration
                      if(item.stopDuration > 180 || other.stopDuration > 180) {
                        // If current train has longer stop, shift it
                        if(item.stopDuration >= other.stopDuration) {
                          shouldShift = true;
                        }
                      } else {
                        // Both short stops or moving - check if at same station
                        if(item.train.position.mode === 'station' && 
                           other.train.position.mode === 'station' &&
                           item.train.position.at === other.train.position.at) {
                          // At same station - shift the later departing train
                          const itemDepSec = getTrainDepTime(item.train);
                          const otherDepSec = getTrainDepTime(other.train);
                          if(itemDepSec && otherDepSec && itemDepSec > otherDepSec) {
                            shouldShift = true;
                          }
                        } else {
                          // Moving trains close together - shift based on train ID to be consistent
                          if(item.train.id > other.train.id) {
                            shouldShift = true;
                          }
                        }
                      }
                    }
                    
                    if(shouldShift) {
                      const shiftAmt = windowWidth >= 1800 ? 37 : windowWidth >= 1400 ? 28 : 20;
                      finalY = baseY + (item.train.direction === 'up' ? -shiftAmt : shiftAmt);
                    }
                    
                    yOffsets.set(item.train.id, finalY);
                  });
                  
                  // Helper function to get departure time
                  function getTrainDepTime(train) {
                    if(train.position.mode === 'station') {
                      const sch = train.normalizedSchedule || [];
                      const stopData = sch.find(s => s.station === train.position.at);
                      if(stopData) {
                        const {depSec} = getArrDepSec(stopData);
                        return depSec;
                      }
                    }
                    return null;
                  }
                  
                  // Render trains with calculated positions
                  return trainsWithPos.map(({train: t, pct}) => {
                    const lineTop = windowWidth >= 1800 ? 136 : windowWidth >= 1400 ? 105 : 74;
                    const chipH = 20, gap = 9;
                    const fallbackY = t.direction === 'up'
                      ? (lineTop - gap - chipH) - 86.5
                      : (lineTop + gap) - 86.5;
                    const y = yOffsets.has(t.id) ? yOffsets.get(t.id) : fallbackY;

                    // 8000番台かどうかを判定
                    const trainNum = parseInt(String(t.id));
                    const thousandsDigit = Math.floor(trainNum / 1000) % 10;
                    const is8000Series = thousandsDigit === 8 && t.type === '貨物';

                    let bgColor, textColor, borderColor, fontWeight;
                    if (t.type === '急行') {
                      bgColor = '#dc2626'; // red-600
                      textColor = '#ffffff';
                      borderColor = '#ef4444'; // red-500
                      fontWeight = 'bold';
                    } else if (t.type === '臨時') {
                      bgColor = '#16a34a'; // green-600
                      textColor = '#ffffff';
                      borderColor = '#22c55e'; // green-500
                      fontWeight = 'normal';
                    } else if (is8000Series) {
                      // 臨貨（8000番台）は薄い青色
                      bgColor = '#60a5fa'; // blue-400 (lighter blue)
                      textColor = '#ffffff';
                      borderColor = '#93c5fd'; // blue-300
                      fontWeight = 'normal';
                    } else if (t.type === '貨物') {
                      bgColor = '#2563eb'; // blue-600
                      textColor = '#ffffff';
                      borderColor = '#3b82f6'; // blue-500
                      fontWeight = 'normal';
                    } else if (t.type === 'SL') {
                      bgColor = 'rgba(168, 85, 247, 0.7)'; // purple-500/70
                      textColor = '#ffffff';
                      borderColor = 'rgba(255, 255, 255, 0.4)';
                      fontWeight = 'normal';
                    } else {
                      bgColor = 'rgba(255, 255, 255, 0.1)';
                      textColor = '#ffffff';
                      borderColor = 'rgba(255, 255, 255, 0.35)';
                      fontWeight = 'normal';
                    }

                    // 編成番号を取得（貨物のみ）
                    let formationText = '';
                    let formationBgColor = bgColor; // デフォルトの背景色
                    if (t.type === '貨物') {
                      const hundredsDigit = Math.floor((trainNum % 1000) / 100);
                      if (hundredsDigit >= 0 && hundredsDigit <= 4) {
                        const formation = formations[String(hundredsDigit)];
                        if (formation) {
                          formationText = `(${formation})`;
                          // 編成番号に応じて背景色を変更
                          if (formation === '303') {
                            formationBgColor = '#eab308'; // yellow
                          } else if (formation === '105') {
                            formationBgColor = '#92400e'; // brown
                          }
                        }
                      }
                    }

                    const hasPass = Array.isArray(t.position.passStations) && t.position.passStations.length>0;
                    const isHighlighted = highlightedTrainId === t.id;

                    return h('div', {
                      key: t.id,
                      className: `absolute -translate-x-1/2 cursor-pointer ${isHighlighted ? 'animate-pulse' : ''}`,
                      style: {
                        left:`${pct}%`, 
                        top:`calc(86.5px + ${y}px)`, 
                        transition: `left ${tickMs}ms linear, top ${tickMs}ms linear`,
                        zIndex: isHighlighted ? 1000 : 'auto'
                      },
                      title: hasPass ? `通過: ${t.position.passStations.join('・')}` : '',
                      onClick: () => setSelectedTrain(t)
                    },
                      h('div', { 
                        className: `rounded-lg text-[11px] monojp flex items-center gap-1`,
                        style: {
                          backgroundColor: formationBgColor,

                          border: isHighlighted ? '3px solid #fbbf24' : `1px solid ${borderColor}`,
                          fontWeight: fontWeight,
                          padding: '0.3rem 0.5rem',
                          boxShadow: isHighlighted ? '0 0 15px rgba(251, 191, 36, 0.8)' : 'none'
                        }
                      },
                        h('span', null, String(t.id).replace('上り','').replace('下り','') + formationText),
                        (() => {
                          const dest = getFinalDestination(t);
                          if (!dest) return null;
                          // 武州原谷行の場合は「原」を表示
                          const displayChar = dest === '武州原谷(貨)' ? '原' : dest.charAt(0);
                          return h('span', null, displayChar);
                        })(),
                        hasPass && h('span', { className: 'opacity-80' }, '通')
                      )
                    );
                  });
                })()
              )
            )
          );
        };

        return h('div', { className: 'min-h-screen' },
          selectedTrain && h(TimetableModal, { 
            train: selectedTrain, 
            onClose: () => setSelectedTrain(null),
            onJumpToTrain: (train) => {
              // 列車の最初の時刻にジャンプ

                const firstTime = firstStop.dep || firstStop.arr || firstStop.time;
                if (firstTime) {

              }

          }),
          showTimeJumpModal && h(TimeJumpModal, {
            onClose: () => setShowTimeJumpModal(false),
            currentTime: now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds(),

              if (targetSec < currentSec) {

                setNotifiedTrains(new Set());

              const newDate = new Date(now);
              const hours = Math.floor(targetSec / 3600);
              const minutes = Math.floor((targetSec % 3600) / 60);

          }),
          showTrainSearchModal && h(TrainSearchModal, {

            onHighlight: (trainId) => {

          showNotificationModal && h(NotificationSettingsModal, {

                    ),

              ),

                      style: {
                        flex: 1,
                        background: timeMode === 'first' ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.06)',
                        color: timeMode === 'first' ? '#fff' : 'rgba(255,255,255,0.5)',
                        border: 'none',
                        borderRight: '1px solid rgba(255,255,255,0.18)',
                        fontFamily: '"MS Gothic","Osaka-Mono",monospace',
                        fontSize: '12px',
                        fontWeight: timeMode === 'first' ? 'bold' : '600',
                        cursor: 'pointer',
                        padding: '4px 8px',
                        transition: 'background 0.15s, color 0.15s'
                      },
                      onClick: () => goFirst(),
                      title: '始発へジャンプ'
                    }, '始発'),
                    h('button', {
                      style: {
                        flex: 1,
                        background: timeMode === 'now' ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.06)',
                        color: timeMode === 'now' ? '#fff' : 'rgba(255,255,255,0.5)',
                        border: 'none',
                        fontFamily: '"MS Gothic","Osaka-Mono",monospace',
                        fontSize: '12px',
                        fontWeight: timeMode === 'now' ? 'bold' : '600',
                        cursor: 'pointer',
                        padding: '4px 8px',
                        transition: 'background 0.15s, color 0.15s'
                      },
                      onClick: () => setToNowClock(),
                      title: '現在時刻へジャンプ'
                    }, 'Now')
                  ),
                  h('select', {
                    className: 'btn monojp',
                    value: speed,
                    onChange: (e) => setSpeed(Number(e.target.value))
                  },
                    h('option', { value: 1 }, '×1'),
                    h('option', { value: 5 }, '×5'),
                    h('option', { value: 10 }, '×10'),
                    h('option', { value: 30 }, '×30'),
                    h('option', { value: 60 }, '×60'),
                    h('option', { value: 120 }, '×120'),
                    h('option', { value: 300 }, '×300')
                  ),
                  h('button', {
                    className: 'btn monojp',
                    onClick: () => {
                      setHiddenFreightTrains(new Set(savedHiddenTrains));
                      setSectionSuspendedTrains(new Set(savedSectionSuspended));
                      setShowFreightSettings(true);
                    }
                  }, '貨物・SL'),
                  h('button', {
                    className: 'btn monojp',
                    onClick: () => setShowCustomTrainInput(true)
                  }, '臨時列車'),
                  h('div', {
                    className: 'col-span-2',
                    style: {
                      display: 'flex',
                      background: 'rgba(13,34,48,0.85)',
                      border: '1px solid rgba(255,255,255,0.18)',
                      borderRadius: '8px',
                      overflow: 'hidden',
                      height: '100%',
                      minHeight: '28px'
                    }
                  },
                    h('button', {
                      style: {
                        flex: 1,
                        background: dayType === 'weekday' ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.06)',
                        color: dayType === 'weekday' ? '#fff' : 'rgba(255,255,255,0.5)',
                        border: 'none',
                        borderRight: '1px solid rgba(255,255,255,0.18)',
                        fontFamily: '"MS Gothic","Osaka-Mono",monospace',
                        fontSize: '12px',
                        fontWeight: dayType === 'weekday' ? 'bold' : '600',
                        cursor: 'pointer',
                        padding: '4px 8px',
                        transition: 'background 0.15s, color 0.15s'
                      },
                      onClick: () => setDayType('weekday')
                    }, '平日'),
                    h('button', {
                      style: {
                        flex: 1,
                        background: dayType === 'holiday' ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.06)',
                        color: dayType === 'holiday' ? '#fff' : 'rgba(255,255,255,0.5)',
                        border: 'none',
                        fontFamily: '"MS Gothic","Osaka-Mono",monospace',
                        fontSize: '12px',
                        fontWeight: dayType === 'holiday' ? 'bold' : '600',
                        cursor: 'pointer',
                        padding: '4px 8px',
                        transition: 'background 0.15s, color 0.15s'
                      },
                      onClick: () => setDayType('holiday')
                    }, '休日')
                  ),
                  h('button', {
                    className: 'btn monojp',
                    onClick: () => setShowTimeJumpModal(true)
                  }, '指定時刻')
                )
              )
            )
          ),
          h('div', { className: 'px-4 py-6 max-w-7xl mx-auto' },
            ...LINES.map((l, i) => renderLine(l, i)),
            h('div', { className: 'mt-6 border border-white/10 bg-white/5 rounded-xl p-4' },
              h('div', { className: 'flex items-center justify-between mb-2' },
                h('div', { className: 'text-white/90 font-bold monojp' }, `運行中: ${trains.length}両`),
                h('div', { className: 'flex gap-2' },
                  h('button', {
                    className: 'btn monojp text-sm',
                    style: { padding: '4px 12px' },
                    onClick: () => setShowTrainSearchModal(true)
                  }, '列番検索'),
                  h('button', {
                    className: 'btn monojp text-sm',
                    style: { padding: '4px 12px' },
                    onClick: () => setShowNotificationModal(true)
                  }, '通知設定')
                )
              ),
              h('div', { className: 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2' },
                ...trains.map(t => {
                  const destination = getFinalDestination(t);
                  const countdown = getTimeUntilDeparture(t, now);
                  
                  // Debug: log to console
                  if (t.id === trains[0]?.id) {
                    console.log('Train:', t.id, 'Destination:', destination, 'Schedule length:', t.schedule?.length);
                  }
                  
                  let longPressTimer = null;
                  let isLongPress = false;
                  
                  return h('div', {
                    key: t.id,
                    className: `border ${highlightedTrainId === t.id ? 'border-yellow-400 bg-yellow-500/20' : 'border-white/10 bg-black/20'} rounded-lg p-2 monojp text-[12px] text-white/90 cursor-pointer hover:bg-black/30 transition-colors`,
                    onClick: () => {
                      if (!isLongPress) {
                        setSelectedTrain(t);
                      }
                    },
                    onDoubleClick: () => {
                      setHighlightedTrainId(t.id);
                      setTimeout(() => setHighlightedTrainId(null), 5000);
                    },
                    onTouchStart: (e) => {
                      isLongPress = false;
                      longPressTimer = setTimeout(() => {
                        isLongPress = true;
                        setHighlightedTrainId(t.id);
                        setTimeout(() => setHighlightedTrainId(null), 5000);
                      }, 500);
                    },
                    onTouchEnd: (e) => {
                      clearTimeout(longPressTimer);
                    },
                    onTouchMove: (e) => {
                      clearTimeout(longPressTimer);
                    },
                    onMouseDown: (e) => {
                      if (e.button === 2) return; // Skip right click
                      isLongPress = false;
                      longPressTimer = setTimeout(() => {
                        isLongPress = true;
                        setHighlightedTrainId(t.id);
                        setTimeout(() => setHighlightedTrainId(null), 5000);
                      }, 500);
                    },
                    onMouseUp: (e) => {
                      clearTimeout(longPressTimer);
                    },
                    onMouseLeave: (e) => {
                      clearTimeout(longPressTimer);
                    },
                    onContextMenu: (e) => {
                      e.preventDefault();
                      setHighlightedTrainId(t.id);
                      setTimeout(() => setHighlightedTrainId(null), 5000);
                    },
                    title: 'タップ: 時刻表 / 長押し: ハイライト'
                  },
                    h('div', { className: 'font-bold' },
                      `${t.id} ${t.type} ${destination}行`
                    ),
                    t.position.mode === 'station'
                      ? h('div', { className: 'text-white/70' }, 
                          countdown 
                            ? `停車中: ${t.position.at} (発車まであと${countdown.minutes}分${countdown.seconds}秒)`
                            : `停車中: ${t.position.at}`
                        )
                      : h('div', { className: 'text-white/70' }, `${t.position.from} → ${t.position.to}`),
                    t.position.passStations?.length > 0 &&
                      h('div', { className: 'text-white/55' }, `通過: ${t.position.passStations.join('・')}`)
                  );
                }),
                trains.length === 0 &&
                  h('div', { className: 'col-span-full text-center text-white/60 monojp py-8' },
                    '列車が表示されない時は「始発」または時刻ボタンで運転時間帯へ。'
                  )
              )
            )
          )
        );
      }

      ReactDOM.render(h(Monitor), document.getElementById('root'));
    })();
  </script>
</body>
</html>
